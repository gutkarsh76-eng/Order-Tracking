<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Tracking Aliases</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }

    header { background: #1a2e4a; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; }
    header a { color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; }
    header a:hover { color: #fff; }

    .container { max-width: 760px; margin: 36px auto; padding: 0 16px; }

    /* Login */
    #loginSection { background: #fff; border-radius: 10px; padding: 32px 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 380px; margin: 60px auto; }
    #loginSection h2 { font-size: 17px; margin-bottom: 18px; color: #1a2e4a; }
    #loginSection input { width: 100%; padding: 11px 14px; font-size: 14px; border: 1.5px solid #d0d7e2; border-radius: 7px; margin-bottom: 12px; outline: none; }
    #loginSection input:focus { border-color: #1a2e4a; }
    #loginSection button { width: 100%; padding: 12px; background: #1a2e4a; color: #fff; border: none; border-radius: 7px; font-size: 15px; font-weight: 600; cursor: pointer; }
    #loginSection button:hover { background: #253d60; }
    .login-err { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }

    /* Add form */
    .card { background: #fff; border-radius: 10px; padding: 24px 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .card h2 { font-size: 15px; font-weight: 700; color: #1a2e4a; margin-bottom: 16px; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-row input { flex: 1; min-width: 150px; padding: 10px 14px; font-size: 14px; border: 1.5px solid #d0d7e2; border-radius: 7px; outline: none; }
    .form-row input:focus { border-color: #1a2e4a; }
    .form-row button { padding: 10px 22px; background: #1a2e4a; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .form-row button:hover { background: #253d60; }
    .form-hint { font-size: 12px; color: #999; margin-top: 8px; }
    .form-msg { font-size: 13px; margin-top: 10px; display: none; }
    .form-msg.ok  { color: #27ae60; }
    .form-msg.err { color: #c0392b; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 14px; background: #f0f3f7; color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid #e4e9f0; }
    td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; background: #eef2ff; color: #3a5ccc; border-radius: 5px; padding: 3px 10px; font-size: 13px; font-weight: 600; font-family: monospace; }
    .badge-ips { background: #f0f5f0; color: #555; }
    .del-btn { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 5px; }
    .del-btn:hover { background: #fff0f0; }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>

<header>
  <h1>Admin — Tracking Aliases</h1>
  <a href="/">← Customer Page</a>
</header>

<!-- Login -->
<div id="loginSection">
  <h2>Admin Login</h2>
  <input id="pwdInput" type="password" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()" />
  <button onclick="login()">Login</button>
  <div class="login-err" id="loginErr">Incorrect password.</div>
</div>

<!-- Main panel (hidden until logged in) -->
<div class="container" id="mainPanel" style="display:none">

  <!-- Add new alias -->
  <div class="card">
    <h2>Add New Alias</h2>
    <div class="form-row">
      <input id="aliasInput"  type="text" placeholder="Custom ID  (e.g. ORD-002)" />
      <input id="realIdInput" type="text" placeholder="Real IPS Tracking ID  (e.g. IPS449713812)" />
      <button onclick="addAlias()">Add</button>
    </div>
    <div class="form-hint">Customers will enter the Custom ID — they will never see the real IPS number.</div>
    <div class="form-msg" id="formMsg"></div>
  </div>

  <!-- Existing mappings -->
  <div class="card">
    <h2>Existing Aliases</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Custom ID (shown to customer)</th>
            <th>Real IPS Tracking ID</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="mappingRows">
          <tr><td colspan="3" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  let PWD = '';

  function login() {
    const p = document.getElementById('pwdInput').value;
    fetch('/api/admin/mappings', { headers: { 'X-Admin-Password': p } })
      .then(r => {
        if (r.status === 401) throw new Error('bad');
        return r.json();
      })
      .then(data => {
        PWD = p;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        renderTable(data);
      })
      .catch(() => {
        document.getElementById('loginErr').style.display = 'block';
      });
  }

  function loadMappings() {
    fetch('/api/admin/mappings', { headers: { 'X-Admin-Password': PWD } })
      .then(r => r.json())
      .then(renderTable);
  }

  function renderTable(data) {
    const tbody = document.getElementById('mappingRows');
    const entries = Object.entries(data);
    if (entries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">No aliases yet. Add one above.</td></tr>';
      return;
    }
    tbody.innerHTML = entries.map(([alias, real]) =>
      `<tr>
        <td><span class="badge">${esc(alias)}</span></td>
        <td><span class="badge badge-ips">${esc(real)}</span></td>
        <td><button class="del-btn" onclick="deleteAlias('${esc(alias)}')">Delete</button></td>
      </tr>`
    ).join('');
  }

  function addAlias() {
    const alias  = document.getElementById('aliasInput').value.trim();
    const realId = document.getElementById('realIdInput').value.trim();
    const msg    = document.getElementById('formMsg');
    if (!alias || !realId) {
      showMsg('Both fields are required.', false); return;
    }
    fetch('/api/admin/mappings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': PWD },
      body: JSON.stringify({ alias, realId })
    })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        document.getElementById('aliasInput').value  = '';
        document.getElementById('realIdInput').value = '';
        showMsg(`Alias "${alias}" added successfully.`, true);
        loadMappings();
      } else {
        showMsg(d.error || 'Error adding alias.', false);
      }
    })
    .catch(() => showMsg('Network error.', false));
  }

  function deleteAlias(alias) {
    if (!confirm(`Delete alias "${alias}"?`)) return;
    fetch('/api/admin/mappings/' + encodeURIComponent(alias), {
      method: 'DELETE',
      headers: { 'X-Admin-Password': PWD }
    })
    .then(r => r.json())
    .then(d => {
      if (d.success) { showMsg(`Alias "${alias}" deleted.`, true); loadMappings(); }
      else showMsg(d.error || 'Error.', false);
    });
  }

  function showMsg(text, ok) {
    const el = document.getElementById('formMsg');
    el.textContent = text;
    el.className = 'form-msg ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
