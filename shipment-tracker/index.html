<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Your Shipment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a2e4a;
      color: #fff;
      padding: 18px 24px;
      text-align: center;
    }
    header h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.5px; }
    header p  { font-size: 13px; opacity: 0.7; margin-top: 4px; }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
    }

    /* Search */
    .search-box {
      background: #fff;
      border-radius: 10px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .search-box label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
    }
    .search-row {
      display: flex;
      gap: 10px;
    }
    .search-row input {
      flex: 1;
      padding: 12px 16px;
      font-size: 15px;
      border: 1.5px solid #d0d7e2;
      border-radius: 7px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: #1a2e4a; }
    .search-row button {
      padding: 12px 24px;
      background: #1a2e4a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-row button:hover { background: #253d60; }
    .search-row button:disabled { background: #8a9ab0; cursor: not-allowed; }

    /* Messages */
    .message {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .message.error   { background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b; }
    .message.info    { background: #f0f5ff; border: 1px solid #c6d6f5; color: #2c5fa3; }

    /* Result card */
    #result { margin-top: 28px; display: none; }

    .order-header {
      background: #1a2e4a;
      color: #fff;
      border-radius: 10px 10px 0 0;
      padding: 18px 22px;
    }
    .order-header .label { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .order-header .order-no { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
    .order-route {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }
    .order-route .arrow { opacity: 0.5; }

    .timeline-card {
      background: #fff;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px 22px;
    }
    .timeline-title {
      font-size: 13px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
    }

    /* Timeline */
    .timeline { position: relative; }
    .timeline-item {
      display: flex;
      gap: 16px;
      padding-bottom: 24px;
      position: relative;
    }
    .timeline-item:last-child { padding-bottom: 0; }

    .dot-col { display: flex; flex-direction: column; align-items: center; width: 18px; flex-shrink: 0; }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #c8d3e0;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .dot.first { background: #1a2e4a; width: 14px; height: 14px; }
    .line {
      flex: 1;
      width: 2px;
      background: #e4e9f0;
      margin-top: 4px;
    }
    .timeline-item:last-child .line { display: none; }

    .event-body { flex: 1; min-width: 0; }
    .event-desc {
      font-size: 14px;
      font-weight: 500;
      color: #222;
      line-height: 1.4;
    }
    .event-desc.first { color: #1a2e4a; font-weight: 600; }
    .event-meta {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .event-location {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .no-events {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 20px 0;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      color: #bbb;
      font-size: 12px;
      margin: 40px 0 20px;
    }

    @media (max-width: 480px) {
      .search-row { flex-direction: column; }
      .order-route { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <h1>Shipment Tracker</h1>
  <p>Real-time updates for your orders</p>
</header>

<div class="container">
  <div class="search-box">
    <label for="trackingInput">Enter your Tracking / Order ID</label>
    <div class="search-row">
      <input
        id="trackingInput"
        type="text"
        placeholder="Enter your tracking number"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') doTrack()"
      />
      <button id="trackBtn" onclick="doTrack()">Track</button>
    </div>
  </div>

  <div id="msgBox" class="message"></div>

  <div id="result">
    <div class="order-header">
      <div class="label">Tracking ID</div>
      <div class="order-no" id="orderNo"></div>
      <div class="order-route" id="orderRoute"></div>
    </div>
    <div class="timeline-card">
      <div class="timeline-title">Shipment Updates</div>
      <div class="timeline" id="timeline"></div>
    </div>
  </div>
</div>

<footer>Track your shipment in real time &mdash; updates are fetched live.</footer>

<script>
  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    if (isNaN(d)) return ts;
    return d.toLocaleString('en-IN', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true
    });
  }

  function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'message ' + type;
    box.style.display = 'block';
  }

  function hideMsg() {
    document.getElementById('msgBox').style.display = 'none';
  }

  async function doTrack() {
    const input = document.getElementById('trackingInput');
    const no = input.value.trim();
    if (!no) { showMsg('Please enter a tracking number.', 'error'); return; }

    const btn = document.getElementById('trackBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Tracking...';
    document.getElementById('result').style.display = 'none';
    hideMsg();

    try {
      const res = await fetch('/api/track?no=' + encodeURIComponent(no));
      const data = await res.json();

      if (!data.success) {
        showMsg(data.message || 'No information found.', res.status === 404 ? 'info' : 'error');
        return;
      }

      // Order header
      document.getElementById('orderNo').textContent = data.orderNo || no;
      const routeEl = document.getElementById('orderRoute');
      if (data.origin && data.destination) {
        routeEl.innerHTML =
          '<span>' + escHtml(data.origin) + '</span>' +
          '<span class="arrow">&#8594;</span>' +
          '<span>' + escHtml(data.destination) + '</span>';
      } else {
        routeEl.innerHTML = '';
      }

      // Timeline
      const tl = document.getElementById('timeline');
      tl.innerHTML = '';
      const traces = data.traces || [];

      if (traces.length === 0) {
        tl.innerHTML = '<div class="no-events">No tracking events yet. Please check back later.</div>';
      } else {
        traces.forEach((t, i) => {
          const item = document.createElement('div');
          item.className = 'timeline-item';
          item.innerHTML =
            '<div class="dot-col">' +
              '<div class="dot' + (i === 0 ? ' first' : '') + '"></div>' +
              '<div class="line"></div>' +
            '</div>' +
            '<div class="event-body">' +
              '<div class="event-desc' + (i === 0 ? ' first' : '') + '">' + escHtml(t.description) + '</div>' +
              (t.location ? '<div class="event-location">' + escHtml(t.location) + '</div>' : '') +
              '<div class="event-meta">' + (t.time ? formatTime(t.time) : '') + '</div>' +
            '</div>';
          tl.appendChild(item);
        });
      }

      document.getElementById('result').style.display = 'block';

    } catch (err) {
      showMsg('Network error. Please check your connection and try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Track';
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
